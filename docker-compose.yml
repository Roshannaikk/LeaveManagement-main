networks:
  lm_network:
    driver: bridge

volumes:
  sqlserver_data:
    driver: local
  mysql_data:
    driver: local
  mongo_data:
    driver: local

services:
  lm_sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest 
    container_name: lm_sql
    environment:
      SA_PASSWORD: "StrongPassword@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1435:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql 
    user: root
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lm_network

  lm_mysql:
    image: mysql:8.0
    container_name: lm_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: leave_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lm_network

  lm_mongo:
    image: mongo:7
    container_name: lm_mongo
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo_data:/data/db
    networks:
      - lm_network

  lm_employee_api:
    build:
      context: .
      dockerfile: Services/Employee.API/Dockerfile
    container_name: lm_employee_api
    ports:
      - "5002:8080"
    depends_on:
      lm_sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >
        Server=lm_sqlserver,1433;
        Database=EmployeeDb;
        User Id=sa;
        Password=StrongPassword@123;
        TrustServerCertificate=True;
    networks:
      - lm_network

  lm_auth_api:
    build:
      context: .
      dockerfile: Services/Auth.API/Dockerfile
    container_name: lm_auth_api
    ports:
      - "5001:8080"
    depends_on:
      lm_sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >
        Server=lm_sqlserver,1433;
        Database=AuthDb;
        User Id=sa;
        Password=StrongPassword@123;
        TrustServerCertificate=True;
    networks:
      - lm_network

  lm_leave_api:
    build:
      context: .
      dockerfile: Services/Leave.API/Dockerfile
    container_name: lm_leave_api
    ports:
      - "5555:5555"
    depends_on:
      lm_mysql:
        condition: service_healthy
    env_file:
      - Services/Leave.API/.env
    networks:
      - lm_network

  lm_notification_api:
    build:
      context: .
      dockerfile: Services/Notification.API/Dockerfile
    container_name: lm_notification_api
    ports:
      - "5004:5004"
    env_file:
      - Services/Notification.API/.env
    depends_on:
      - lm_mongo
    networks:
      - lm_network

  lm_frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lm_frontend
    ports:
      - "3000:80"
    depends_on:
      - lm_auth_api
      - lm_employee_api
      - lm_leave_api
      - lm_notification_api
    networks:
      - lm_network